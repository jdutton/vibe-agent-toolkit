version: 1

skills:
  source:
    - SKILL.md

  config:
    external-cli-skill-with-allow:
      validation:
        allow:
          COMPAT_REQUIRES_EXTERNAL_CLI:
            - reason: "Uses `az` CLI to query Azure resources"
          COMPAT_REQUIRES_LOCAL_SHELL:
            - reason: "Shells out via Bash; Code surface provides this"
