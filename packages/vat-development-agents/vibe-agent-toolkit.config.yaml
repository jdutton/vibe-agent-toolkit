# vibe-agent-toolkit configuration for vat-development-agents
# Skills are discovered from SKILL.md files, built to dist/skills/, then
# wrapped into Claude plugin structure at dist/.claude/plugins/marketplaces/.

version: 1

skills:
  include: ["resources/skills/SKILL.md", "resources/skills/vat-*.md"]
  defaults:
    linkFollowDepth: 2
    excludeNavigationFiles: true
  config:
    vibe-agent-toolkit:
      linkFollowDepth: 0
      # External monorepo docs are intentionally left as text pointers.
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**"]
    authoring:
      # Follow one hop so the sibling skill-quality-checklist.md gets bundled.
      # External docs/ references are intentionally left as text pointers.
      linkFollowDepth: 1
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**"]
    debugging:
      linkFollowDepth: 0
      # External monorepo docs and package CLAUDE.md files are intentionally
      # left as text pointers.
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**", "packages/*/CLAUDE.md"]

claude:
  marketplaces:
    vat-skills:
      owner:
        name: vibe-agent-toolkit contributors
      publish:
        branch: claude-marketplace
        changelog: ../../CHANGELOG.md
        readme: ../../docs/marketplace-readme.md
        license: mit
      plugins:
        - name: vibe-agent-toolkit
          description: Development agents and skills for building with vibe-agent-toolkit
          skills: "*"
