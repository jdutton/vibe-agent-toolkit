# vibe-agent-toolkit configuration for vat-development-agents
# Skills are discovered from SKILL.md files, built to dist/skills/, then
# wrapped into Claude plugin structure at dist/.claude/plugins/marketplaces/.

version: 1

skills:
  include: ["resources/skills/SKILL.md", "resources/skills/vat-*.md"]
  defaults:
    linkFollowDepth: 2
    excludeNavigationFiles: true
    # VAT development skills (authoring, debugging, build orchestration) all
    # require local shell to invoke `vat`/`bun`/`git` — claude-code is the
    # only runtime that fits.
    targets: ['claude-code']
  config:
    vibe-agent-toolkit:
      linkFollowDepth: 0
      # External monorepo docs are intentionally left as text pointers.
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**"]
    vat-agent-authoring:
      # vat-skill-review is now a sibling standalone skill, so no transclusion needed.
      # External monorepo docs are intentionally left as text pointers.
      linkFollowDepth: 0
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**"]
    vat-skill-authoring:
      # External monorepo docs are intentionally left as text pointers.
      linkFollowDepth: 0
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**"]
    vat-skill-review:
      # External monorepo docs are intentionally left as text pointers.
      linkFollowDepth: 0
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**"]
    vat-rag:
      # External monorepo docs and package READMEs are intentionally left as text pointers.
      linkFollowDepth: 0
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**", "packages/**/README.md"]
    vat-adoption-and-configuration:
      # External monorepo docs are intentionally left as text pointers.
      linkFollowDepth: 0
      excludeReferencesFromBundle:
        rules:
          - patterns: ["docs/**"]

claude:
  marketplaces:
    vat-skills:
      owner:
        name: vibe-agent-toolkit contributors
      publish:
        branch: claude-marketplace
        changelog: ../../CHANGELOG.md
        readme: ../../docs/marketplace-readme.md
        license: mit
      plugins:
        - name: vibe-agent-toolkit
          description: Development agents and skills for building with vibe-agent-toolkit
          skills: "*"
